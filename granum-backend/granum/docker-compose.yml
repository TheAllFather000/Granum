version: '3.9'

services:

  # ── PostgreSQL database ────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: granum_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME:-linkhive}
      POSTGRES_USER:     ${DB_USER:-linkhive}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-linkhive_secret}
    command: postgres -c listen_addresses='*'
    volumes:
      - linkhive_postgres_data:/var/lib/postgresql/data
      - ./migrations/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "0.0.0.0:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-linkhive}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (sessions + OTP cache) ──────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: granum_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret}
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Node.js API ────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: granum_api
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV:      ${NODE_ENV:-development}
      DB_HOST:       db
      DB_PORT:       5432
      REDIS_HOST:    redis
      REDIS_PORT:    6379
      CORS_ORIGIN:   "http://localhost:*"
    ports:
      - "${API_PORT:-3000}:3000"
    volumes:
      - ./src:/app/src          # hot-reload in dev
      - ./migrations:/app/migrations
      - ./seeds:/app/seeds
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "node src/scripts/migrate.js && npm run dev"

volumes:
  linkhive_postgres_data:
